<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miniagent</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  --mono:'SF Mono',Consolas,'Liberation Mono',monospace;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text)}
.app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:260px;min-width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-header h2{font-size:15px;font-weight:600;color:var(--accent)}
.btn-new{background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500}
.btn-new:hover{opacity:.85}
.task-list{flex:1;overflow-y:auto;padding:8px}
.task-item{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px;transition:background .15s}
.task-item:hover{background:var(--bg3)}
.task-item.active{background:var(--bg4)}
.task-item .task-title{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-item .task-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:6px}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.status-dot.running{background:var(--yellow)}
.status-dot.completed{background:var(--green)}
.status-dot.failed{background:var(--red)}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2)}
.chat-header h3{font-size:14px;font-weight:500;color:var(--text2)}
.stage-pills{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.stage-pill{font-size:11px;padding:3px 8px;border-radius:10px;background:var(--bg3);color:var(--text3);transition:all .2s}
.stage-pill.running{background:#1f3a5f;color:var(--accent)}
.stage-pill.completed{background:#1a3a2a;color:var(--green)}
.stage-pill.failed{background:#3a1a1a;color:var(--red)}

/* ── Messages ── */
.messages{flex:1;overflow-y:auto;padding:20px;scroll-behavior:smooth}
.msg{margin-bottom:16px;max-width:800px}
.msg-user{margin-left:auto;margin-right:0;max-width:70%}
.msg-user .msg-bubble{background:var(--accent);color:#fff;border-radius:12px 12px 2px 12px;padding:10px 14px;font-size:14px;line-height:1.5;white-space:pre-wrap}
.msg-ai .msg-bubble{background:var(--bg2);border:1px solid var(--border);border-radius:4px 12px 12px 12px;padding:14px 16px;font-size:14px;line-height:1.7}
.msg-ai .msg-bubble p{margin-bottom:8px}
.msg-ai .msg-bubble p:last-child{margin-bottom:0}
.msg-ai .msg-bubble code{background:var(--bg3);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:13px}
.msg-ai .msg-bubble pre{background:var(--bg3);border-radius:6px;padding:12px;overflow-x:auto;margin:8px 0}
.msg-ai .msg-bubble pre code{background:none;padding:0}
.msg-ai .msg-bubble ul,.msg-ai .msg-bubble ol{padding-left:20px;margin:8px 0}
.msg-ai .msg-bubble li{margin:4px 0}
.msg-ai .msg-bubble blockquote{border-left:3px solid var(--accent);padding-left:12px;color:var(--text2);margin:8px 0}
.msg-ai .msg-bubble table{border-collapse:collapse;width:100%;margin:8px 0}
.msg-ai .msg-bubble th,.msg-ai .msg-bubble td{border:1px solid var(--border);padding:6px 10px;text-align:left;font-size:13px}
.msg-ai .msg-bubble th{background:var(--bg3)}
.msg-ai .msg-bubble h1,.msg-ai .msg-bubble h2,.msg-ai .msg-bubble h3,.msg-ai .msg-bubble h4{margin:12px 0 6px;color:var(--text)}
.msg-ai .msg-bubble a{color:var(--accent)}
.msg-ai .msg-bubble hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.msg-ai .msg-bubble img{max-width:100%;border-radius:6px}

.msg-system .msg-bubble{background:var(--bg3);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text2);text-align:center}

/* File download badge */
.file-download{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 10px;margin:4px 2px;font-size:12px;color:var(--accent);cursor:pointer;text-decoration:none;transition:background .15s}
.file-download:hover{background:var(--bg4)}
.file-download .icon{font-size:14px}

/* Streaming cursor */
.cursor{display:inline-block;width:2px;height:1em;background:var(--accent);animation:blink 1s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes blink{50%{opacity:0}}

/* ── Input ── */
.input-area{padding:16px 20px;border-top:1px solid var(--border);background:var(--bg2)}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-wrap{flex:1;position:relative}
.input-wrap textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;font-family:var(--font);resize:none;min-height:44px;max-height:200px;outline:none;line-height:1.5;transition:border-color .2s}
.input-wrap textarea:focus{border-color:var(--accent)}
.input-wrap textarea::placeholder{color:var(--text3)}
.btn-send{width:44px;height:44px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:opacity .15s}
.btn-send:hover{opacity:.85}
.btn-send:disabled{opacity:.3;cursor:not-allowed}
.btn-upload{width:44px;height:44px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.btn-upload:hover{background:var(--bg4);color:var(--text)}

/* File chips */
.file-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.file-chip{display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text2)}
.file-chip .remove{cursor:pointer;color:var(--text3);margin-left:2px}
.file-chip .remove:hover{color:var(--red)}

/* ── Drag overlay ── */
.drag-overlay{position:fixed;inset:0;background:rgba(13,17,23,.9);z-index:1000;display:none;align-items:center;justify-content:center;pointer-events:none}
.drag-overlay.active{display:flex}
.drag-overlay .inner{border:2px dashed var(--accent);border-radius:16px;padding:40px;text-align:center;color:var(--accent)}
.drag-overlay .inner p{font-size:16px;margin-top:8px}

/* ── Toast ── */
.toast{position:fixed;bottom:80px;right:20px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:13px;color:var(--text);z-index:999;opacity:0;transform:translateY(10px);transition:all .3s}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{border-color:var(--red);color:var(--red)}

/* ── Responsive ── */
@media(max-width:768px){
  .sidebar{width:0;min-width:0;overflow:hidden;transition:width .3s}
  .sidebar.open{width:260px;min-width:200px;position:absolute;z-index:100;height:100%}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Miniagent</h2>
      <button class="btn-new" onclick="newTask()" title="New Task">+ New</button>
    </div>
    <div class="task-list" id="taskList"></div>
    <div class="sidebar-footer">Miniagent v0.1</div>
  </aside>

  <div class="main">
    <div class="chat-header">
      <div class="stage-pills" id="stagePills"></div>
      <h3 id="chatTitle">Ready</h3>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="file-chips" id="fileChips"></div>
      <div class="input-row">
        <button class="btn-upload" onclick="document.getElementById('fileInput').click()" title="Upload file">+</button>
        <input type="file" id="fileInput" multiple hidden accept=".txt,.md,.pdf,.csv,.json,.py,.rs,.js,.ts,.html,.css">
        <div class="input-wrap">
          <textarea id="input" rows="1" placeholder="Send a message..." onkeydown="handleKey(event)"></textarea>
        </div>
        <button class="btn-send" id="btnSend" onclick="sendMessage()">&#9654;</button>
      </div>
    </div>
  </div>
</div>

<div class="drag-overlay" id="dragOverlay">
  <div class="inner">
    <div style="font-size:40px">&#128196;</div>
    <p>Drop files here</p>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── State ──
let ws = null;
let tasks = {};
let currentTaskId = null;
let uploadedFiles = [];
let isStreaming = false;

// ── WebSocket ──
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/chat`);
  ws.onopen = () => { showToast('Connected'); loadTasks(); };
  ws.onmessage = (e) => {
    try { handleMsg(JSON.parse(e.data)); }
    catch(err) { handleMsg({ type: 'stream', text: e.data }); }
  };
  ws.onclose = () => { showToast('Disconnected', true); setTimeout(connect, 3000); };
  ws.onerror = () => {};
}

function handleMsg(msg) {
  switch(msg.type) {
    case 'status':
      addSystemMsg(msg.message);
      break;
    case 'plan':
      showPlan(msg.workflow, msg.stages);
      break;
    case 'progress':
      updateStagePill(msg.stage, msg.status);
      if (msg.tokens) updateMeta(msg.tokens);
      break;
    case 'stream':
      appendStream(msg.text);
      break;
    case 'complete':
      finishStream(msg.task_id, msg.files);
      break;
    case 'error':
      finishStreamError(msg.message);
      break;
    case 'tasks':
      tasks = msg.tasks;
      renderTaskList();
      break;
  }
}

// ── Tasks ──
function loadTasks() {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'list_tasks' }));
  }
}

function renderTaskList() {
  const el = document.getElementById('taskList');
  el.innerHTML = '';
  const sorted = Object.entries(tasks).sort((a,b) =>
    new Date(b[1].created_at) - new Date(a[1].created_at));
  for (const [id, t] of sorted) {
    const div = document.createElement('div');
    div.className = 'task-item' + (id === currentTaskId ? ' active' : '');
    div.onclick = () => selectTask(id);
    div.innerHTML = `
      <div class="task-title">${escHtml(t.brief || t.prompt.slice(0,50))}</div>
      <div class="task-meta">
        <span class="status-dot ${t.status}"></span>
        ${t.status} &middot; ${new Date(t.created_at).toLocaleString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}
      </div>`;
    el.appendChild(div);
  }
}

function selectTask(id) {
  currentTaskId = id;
  renderTaskList();
  document.getElementById('chatTitle').textContent = tasks[id]?.brief || id;
}

function newTask() {
  currentTaskId = null;
  document.getElementById('messages').innerHTML = '';
  document.getElementById('stagePills').innerHTML = '';
  document.getElementById('chatTitle').textContent = 'Ready';
  renderTaskList();
}

// ── Messages ──
function addUserMsg(text) {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg msg-user';
  div.innerHTML = `<div class="msg-bubble">${escHtml(text)}</div>`;
  el.appendChild(div);
  scrollBottom();
}

function addSystemMsg(text) {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg msg-system';
  div.innerHTML = `<div class="msg-bubble">${escHtml(text)}</div>`;
  el.appendChild(div);
  scrollBottom();
}

let streamEl = null;
let streamRaw = '';

function startStream() {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg msg-ai';
  div.innerHTML = `<div class="msg-bubble"><span class="cursor"></span></div>`;
  el.appendChild(div);
  streamEl = div.querySelector('.msg-bubble');
  streamRaw = '';
  isStreaming = true;
  scrollBottom();
}

function appendStream(text) {
  if (!streamEl) startStream();
  streamRaw += text;
  renderStream();
  scrollBottom();
}

function renderStream() {
  if (!streamEl) return;
  const html = marked.parse(streamRaw);
  streamEl.innerHTML = html + '<span class="cursor"></span>';
}

function finishStream(taskId, files) {
  isStreaming = false;
  if (streamEl) {
    streamEl.innerHTML = marked.parse(streamRaw);
  }
  streamEl = null;
  streamRaw = '';
  if (taskId) {
    currentTaskId = taskId;
    if (files && files.length) {
      addDownloadBadges(taskId, files);
    }
    loadTasks();
  }
  document.getElementById('btnSend').disabled = false;
}

function finishStreamError(message) {
  isStreaming = false;
  if (streamEl) {
    streamEl.innerHTML = `<span style="color:var(--red)">${escHtml(message)}</span>`;
  }
  streamEl = null;
  streamRaw = '';
  document.getElementById('btnSend').disabled = false;
}

function addDownloadBadges(taskId, files) {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg msg-ai';
  let badges = files.map(f =>
    `<a class="file-download" href="/api/download/${taskId}/${f}" download>
      <span class="icon">&#128196;</span>${escHtml(f)}
    </a>`).join('');
  div.innerHTML = `<div class="msg-bubble">${badges}</div>`;
  el.appendChild(div);
  scrollBottom();
}

// ── Stages ──
function showPlan(workflow, stages) {
  const el = document.getElementById('stagePills');
  el.innerHTML = '';
  for (const s of stages) {
    const pill = document.createElement('span');
    pill.className = 'stage-pill';
    pill.id = 'stage-' + s.name;
    pill.textContent = s.name;
    el.appendChild(pill);
  }
}

function updateStagePill(name, status) {
  const pill = document.getElementById('stage-' + name);
  if (pill) pill.className = 'stage-pill ' + status;
}

function updateMeta(tokens) {
  const title = document.getElementById('chatTitle');
  title.textContent = `Tokens: ${tokens}`;
}

// ── Input ──
function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  addUserMsg(text);

  // Clear file chips
  const fileIds = uploadedFiles.map(f => f.id);
  uploadedFiles = [];
  document.getElementById('fileChips').innerHTML = '';

  startStream();
  document.getElementById('btnSend').disabled = true;

  ws.send(JSON.stringify({
    type: 'run',
    prompt: text,
    files: fileIds,
  }));

  input.value = '';
  autoResize(input);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ── File Upload ──
document.getElementById('fileInput').addEventListener('change', async (e) => {
  for (const file of e.target.files) {
    await uploadFile(file);
  }
  e.target.value = '';
});

async function uploadFile(file) {
  const form = new FormData();
  form.append('file', file);
  try {
    const resp = await fetch('/api/upload', { method: 'POST', body: form });
    const data = await resp.json();
    if (data.files) {
      for (const f of data.files) {
        uploadedFiles.push(f);
        addFileChip(f);
      }
    }
  } catch(err) {
    showToast('Upload failed: ' + err.message, true);
  }
}

function addFileChip(file) {
  const el = document.getElementById('fileChips');
  const chip = document.createElement('span');
  chip.className = 'file-chip';
  chip.innerHTML = `${escHtml(file.name)} <span class="remove" onclick="removeFile(this,'${file.id}')">&times;</span>`;
  el.appendChild(chip);
}

function removeFile(el, id) {
  uploadedFiles = uploadedFiles.filter(f => f.id !== id);
  el.parentElement.remove();
}

// ── Drag & Drop ──
document.addEventListener('dragover', (e) => { e.preventDefault(); document.getElementById('dragOverlay').classList.add('active'); });
document.addEventListener('dragleave', (e) => { if (e.relatedTarget === null) document.getElementById('dragOverlay').classList.remove('active'); });
document.addEventListener('drop', async (e) => {
  e.preventDefault();
  document.getElementById('dragOverlay').classList.remove('active');
  for (const file of e.dataTransfer.files) {
    await uploadFile(file);
  }
});

// ── Auto-resize textarea ──
const input = document.getElementById('input');
input.addEventListener('input', () => autoResize(input));
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

// ── Helpers ──
function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => el.className = 'toast', 3000);
}

// ── Init ──
connect();
</script>
</body>
</html>
